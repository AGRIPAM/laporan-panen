<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Laporan Panen TBS</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f7; margin: 0; padding: 20px; }
        .container { max-width: 400px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: auto; }
        h2 { text-align: center; color: #333; font-size: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 15px; }
        .readonly-input { background-color: #e9ecef; color: #495057; cursor: not-allowed; }

        /* Gaya Tombol */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; color: white; border: none; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .btn-submit { background-color: #28a745; }
        .btn-submit:hover { background-color: #218838; }
        .btn-delete { background-color: #dc3546; }
        .btn-delete:hover { background-color: #c82333; }
        .btn-refresh { background-color: #007bff; flex: 0 0 auto; padding: 10px 14px; font-size: 13px; margin-top: 5px; }
        .btn-refresh:hover { background-color: #0069d9; }
        .btn-logout { background-color: #6c757d; margin-top: 15px; font-size: 13px; padding: 8px; }
        .btn-logout:hover { background-color: #5a6268; }
        button:disabled { background-color: #6c757d; cursor: not-allowed; }

        #status { text-align: center; margin-top: 15px; font-weight: bold; font-size: 14px; min-height: 20px; }
        .akumulasi-row { display: flex; align-items: flex-end; gap: 8px; }
        .akumulasi-row .field-wrap { flex: 1; }
        small.hint { color: #888; display: block; margin-top: 4px; font-size: 12px; }
        
        /* Informasi Region Aktif */
        .active-region { text-align: center; color: #007bff; font-weight: bold; margin-top: -10px; margin-bottom: 15px; font-size: 15px;}
    </style>
</head>
<body>

<div id="loginSection" class="container">
    <h2>Login Akses Region</h2>

    <label>Region / Wilayah:</label>
    <select id="loginRegion" required>
        <option value="" disabled selected>Pilih Wilayah...</option>
        <option value="Aceh">Aceh</option>
        <option value="Sumatera Utara 1">Sumatera Utara 1</option>
        <option value="Sumatera Utara 2 Ex Torganda">Sumatera Utara 2 Ex Torganda</option>
        <option value="Riau 1">Riau 1</option>
        <option value="Riau 2">Riau 2</option>
        <option value="Riau 3">Riau 3</option>
        <option value="Riau 4">Riau 4</option>
        <option value="Bangka Belitung">Bangka Belitung</option>
        <option value="Jambi">Jambi</option>
        <option value="Sumatera Barat">Sumatera Barat</option>
        <option value="Sumatera Selatan">Sumatera Selatan</option>
        <option value="Kalimantan Barat 1">Kalimantan Barat 1</option>
        <option value="Kalimantan Barat 2">Kalimantan Barat 2</option>
        <option value="Kalimantan Selatan 1">Kalimantan Selatan 1</option>
        <option value="Kalimantan Selatan 2">Kalimantan Selatan 2</option>
        <option value="Kalimantan Timur">Kalimantan Timur</option>
        <option value="Kalimantan Utara">Kalimantan Utara</option>
        <option value="Kalimantan Tengah 1">Kalimantan Tengah 1</option>
        <option value="Kalimantan Tengah 2">Kalimantan Tengah 2</option>
        <option value="Kalimantan Tengah 3">Kalimantan Tengah 3</option>
        <option value="Sulawesi Tenggara">Sulawesi Tenggara</option>
        <option value="Sulawesi Tengah">Sulawesi Tengah</option>
    </select>

    <label>Password Region:</label>
    <input type="password" id="loginPassword" placeholder="Masukkan Password">

    <button id="loginBtn" onclick="prosesLogin()" class="btn-submit" style="width: 100%; margin-top: 20px;">Masuk</button>
    <p id="loginError" style="color: #dc3545; display: none; text-align: center; margin-top: 15px; font-weight: bold;"></p>
</div>

<div id="mainSection" class="container" style="display: none;">
    <h2>Laporan Panen Harian</h2>
    <p id="displayRegionText" class="active-region"></p>


    <form id="panenForm" onsubmit="return false;">

        <input type="hidden" id="region" name="region">
        <input type="hidden" id="password" name="password">

        <label>Tanggal Laporan:</label>
        <input type="date" id="tanggal" name="tanggal" required onchange="checkAccumulation()">

        <label>Jam Laporan:</label>
        <select id="jam" name="jam" required onchange="updateJamHint()">
            <option value="" disabled selected>Pilih Jam...</option>
            <option value="06.00">06.00</option>
            <option value="07.00">07.00</option>
            <option value="08.00">08.00</option>
            <option value="09.00">09.00</option>
            <option value="10.00">10.00</option>
            <option value="11.00">11.00</option>
            <option value="12.00">12.00</option>
            <option value="13.00">13.00</option>
            <option value="14.00">14.00</option>
            <option value="15.00">15.00</option>
            <option value="16.00">16.00</option>
            <option value="17.30">17.30</option>
        </select>
        <small class="hint" id="jamHint"></small>

        <label>Estimasi Panen Saat Ini (Ton):</label>
        <input type="number" step="0.01" id="tonase" name="tonase" placeholder="Kosongkan jika hanya ingin Hapus Data">

        <label>Total Akumulasi (Ton) — diambil langsung dari database:</label>
        <div class="akumulasi-row">
            <div class="field-wrap">
                <input type="number" step="0.01" id="akumulasi" class="readonly-input" value="0" readonly>
            </div>
            <button type="button" class="btn-refresh" onclick="checkAccumulation()">Refresh</button>
        </div>

        <div class="btn-group">
            <button type="button" id="submitBtn" class="btn-submit" onclick="handleInsert()">Kirim Data</button>
            <button type="button" id="deleteBtn" class="btn-delete" onclick="handleDelete()">Hapus Jam Ini</button>
        </div>
        
        <button type="button" class="btn-logout" style="width: 100%;" onclick="prosesLogout()">Ganti Region (Logout)</button>
        <p id="status"></p>
    </form>
</div>

<script>
    // =========================================================
    // FUNGSI LOGIN & LOGOUT
    // =========================================================
    // Catatan: validasi password TIDAK lagi dilakukan di sisi browser.
    // Password divalidasi langsung oleh server (Apps Script) lewat
    // action="login", menggunakan REGION_PASSWORDS di backend sebagai
    // satu-satunya sumber kebenaran. Ini mencegah daftar password di
    // frontend & backend menjadi tidak sinkron seperti sebelumnya.
    function prosesLogin() {
        var inputRegion = document.getElementById("loginRegion").value;
        var inputPassword = document.getElementById("loginPassword").value;
        var errorMsg = document.getElementById("loginError");
        var loginBtn = document.getElementById("loginBtn");

        errorMsg.style.display = "none";

        if (!inputRegion) {
            errorMsg.innerText = "Harap pilih Region terlebih dahulu!";
            errorMsg.style.display = "block";
            return;
        }
        if (!inputPassword) {
            errorMsg.innerText = "Harap masukkan Password!";
            errorMsg.style.display = "block";
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerText = "Memeriksa...";

        jsonpRequest(
            { action: "login", region: inputRegion, password: inputPassword },
            function (res) {
                loginBtn.disabled = false;
                loginBtn.innerText = "Masuk";

                if (res.success) {
                    // Sembunyikan bagian login, tampilkan bagian utama
                    document.getElementById("loginSection").style.display = "none";
                    document.getElementById("mainSection").style.display = "block";

                    // Pindahkan nilai region dan password ke input tersembunyi
                    document.getElementById("region").value = inputRegion;
                    document.getElementById("password").value = inputPassword;

                    // Tampilkan info region di bagian atas form
                    document.getElementById("displayRegionText").innerText = "Region: " + inputRegion;

                    errorMsg.style.display = "none"; // Reset pesan error

                    // Jika tanggal sudah terisi (misal user login ulang), langsung refresh data
                    if (document.getElementById("tanggal").value) {
                        checkAccumulation();
                    }
                } else {
                    errorMsg.innerText = res.message || ("Password salah untuk Region " + inputRegion + "!");
                    errorMsg.style.display = "block";
                }
            },
            function (errMsg) {
                loginBtn.disabled = false;
                loginBtn.innerText = "Masuk";
                errorMsg.innerText = errMsg;
                errorMsg.style.display = "block";
            }
        );
    }

    function prosesLogout() {
        // Kosongkan form utama dan kembalikan ke layar login
        document.getElementById("loginPassword").value = "";
        document.getElementById("status").innerText = "";
        document.getElementById("mainSection").style.display = "none";
        document.getElementById("loginSection").style.display = "block";

        // Kosongkan data sesi (region, password, tampilan region)
        document.getElementById("region").value = "";
        document.getElementById("password").value = "";
        document.getElementById("displayRegionText").innerText = "";

        // Kosongkan state data
        currentJamData = {};
        updateJamHint();
    }


    // =========================================================
    // KONFIGURASI ORIGINAL (TIDAK ADA YANG DIUBAH DI BAWAH INI)
    // =========================================================
    var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzqXfntnvNd7avgnfmfgeWu4UCf-iT2tVNMHZVNjJYZHpreOXow0R6nalGrMtqS4IGlFQ/exec";

    var currentJamData = {};
    var statusText = document.getElementById('status');
    var submitBtn = document.getElementById('submitBtn');
    var deleteBtn = document.getElementById('deleteBtn');
    var akumulasiField = document.getElementById('akumulasi');

    function jsonpRequest(params, onSuccess, onError) {
        var callbackName = "jsonp_cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        var script = document.createElement("script");
        var timeoutId;

        function cleanup() {
            delete window[callbackName];
            if (script.parentNode) script.parentNode.removeChild(script);
            clearTimeout(timeoutId);
        }

        window[callbackName] = function (data) {
            cleanup();
            onSuccess(data);
        };

        var query = Object.keys(params).map(function (k) {
            return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
        }).join("&");

        script.src = SCRIPT_URL + "?" + query + "&callback=" + callbackName;
        script.onerror = function () {
            cleanup();
            onError("Gagal terhubung ke server. Periksa koneksi internet Anda.");
        };

        timeoutId = setTimeout(function () {
            cleanup();
            onError("Server tidak merespons (timeout). Coba lagi.");
        }, 20000);

        document.body.appendChild(script);
    }

    function checkAccumulation() {
        var tanggal = document.getElementById('tanggal').value;
        var region = document.getElementById('region').value;

        if (!tanggal || !region) {
            akumulasiField.value = "0";
            currentJamData = {};
            updateJamHint();
            return;
        }

        akumulasiField.value = "";
        setStatus("Mengambil data terbaru dari database...", "#555");

        jsonpRequest(
            { action: "getData", tanggal: tanggal, region: region },
            function (res) {
                if (res.success) {
                    akumulasiField.value = res.total.toFixed(2);
                    currentJamData = res.jamData || {};
                    setStatus("", "");
                } else {
                    akumulasiField.value = "0";
                    currentJamData = {};
                    setStatus(res.message || "Gagal mengambil data.", "#dc3545");
                }
                updateJamHint();
            },
            function (errMsg) {
                akumulasiField.value = "0";
                setStatus(errMsg, "#dc3545");
            }
        );
    }

    function updateJamHint() {
        var jam = document.getElementById('jam').value;
        var hint = document.getElementById('jamHint');

        if (!jam) {
            hint.innerText = "";
            return;
        }

        if (currentJamData.hasOwnProperty(jam)) {
            hint.innerText = "Jam " + jam + " sudah terisi: " + currentJamData[jam] + " Ton. " +
                              "Gunakan 'Hapus Jam Ini' jika ingin merevisi.";
            hint.style.color = "#dc3545";
        } else {
            hint.innerText = "Jam " + jam + " belum ada data.";
            hint.style.color = "#28a745";
        }
    }

    function checkPasswordFilled() {
        if (!document.getElementById('password').value) {
            alert("Sesi login terputus, harap login ulang!");
            return false;
        }
        return true;
    }

    function handleInsert() {
        var tanggal = document.getElementById('tanggal').value;
        var region = document.getElementById('region').value;
        var jam = document.getElementById('jam').value;
        var tonase = document.getElementById('tonase').value;
        var password = document.getElementById('password').value;

        if (!tanggal || !region || !jam) {
            alert("Harap lengkapi Tanggal dan Jam!");
            return;
        }
        if (!tonase) {
            alert("Harap isi angka tonase untuk dikirim!");
            return;
        }
        if (!checkPasswordFilled()) return;

        if (currentJamData.hasOwnProperty(jam)) {
            alert("Data untuk jam " + jam + " sudah pernah diisi. Gunakan tombol 'Hapus Jam Ini' jika ingin merevisi.");
            return;
        }

        setLoading(true, "Mengirim data...");

        jsonpRequest(
            {
                action: "insert",
                tanggal: tanggal,
                region: region,
                jam: jam,
                tonase: tonase,
                password: password
            },
            function (res) {
                setLoading(false);
                if (res.success) {
                    setStatus(res.message, "green");
                    document.getElementById('tonase').value = "";
                    if (res.total !== undefined) akumulasiField.value = res.total.toFixed(2);
                    if (res.jamData) currentJamData = res.jamData;
                    updateJamHint();
                } else {
                    setStatus(res.message || "Gagal mengirim data.", "#dc3545");
                    if (res.total !== undefined) akumulasiField.value = res.total.toFixed(2);
                    if (res.jamData) { currentJamData = res.jamData; updateJamHint(); }
                }
            },
            function (errMsg) {
                setLoading(false);
                setStatus(errMsg, "#dc3545");
            }
        );
    }

    function handleDelete() {
        var tanggal = document.getElementById('tanggal').value;
        var region = document.getElementById('region').value;
        var jam = document.getElementById('jam').value;
        var password = document.getElementById('password').value;

        if (!tanggal || !region || !jam) {
            alert("Pilih Tanggal dan Jam yang ingin dihapus!");
            return;
        }
        if (!checkPasswordFilled()) return;

        if (!currentJamData.hasOwnProperty(jam)) {
            alert("TIDAK DITEMUKAN: Tidak ada data tersimpan untuk jam " + jam + " pada Tanggal & Region ini.");
            return;
        }

        var konfirmasi = confirm(
            "Apakah Anda yakin ingin menghapus data laporan jam " + jam + "?\n" +
            "Tonase sebesar " + currentJamData[jam] + " Ton akan dihapus dari database & akumulasi."
        );
        if (!konfirmasi) return;

        setLoading(true, "Menghapus data...");

        jsonpRequest(
            {
                action: "delete",
                tanggal: tanggal,
                region: region,
                jam: jam,
                password: password
            },
            function (res) {
                setLoading(false);
                if (res.success) {
                    setStatus(res.message, "#dc3545");
                } else {
                    setStatus(res.message || "Gagal menghapus data.", "#dc3545");
                }
                if (res.total !== undefined) akumulasiField.value = res.total.toFixed(2);
                if (res.jamData) currentJamData = res.jamData;
                updateJamHint();
            },
            function (errMsg) {
                setLoading(false);
                setStatus(errMsg, "#dc3545");
            }
        );
    }

    function setLoading(isLoading, text) {
        submitBtn.disabled = isLoading;
        deleteBtn.disabled = isLoading;
        if (isLoading) setStatus(text, "#555");
    }

    function setStatus(text, color) {
        statusText.innerText = text;
        statusText.style.color = color;
    }
</script>

</body>
</html>
