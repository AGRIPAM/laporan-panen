<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Laporan Panen TBS</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f7; margin: 0; padding: 20px; }
        .container { max-width: 400px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: auto; }
        h2 { text-align: center; color: #333333; font-size: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 15px; }
        .readonly-input { background-color: #e9ecef; color: #495057; cursor: not-allowed; }

        /* Logo */
        .logo-wrapper { text-align: center; margin-bottom: 18px; margin-top: 4px; }
        .logo-wrapper img { max-width: 280px; width: 100%; height: auto; }

        /* Divider tipis di bawah logo */
        .logo-divider { border: none; border-top: 1px solid #e0e0e0; margin: 0 0 16px 0; }

        /* Gaya Tombol */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; color: white; border: none; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .btn-submit { background-color: #28a745; }
        .btn-submit:hover { background-color: #218838; }
        .btn-delete { background-color: #dc3546; }
        .btn-delete:hover { background-color: #c82333; }
        .btn-refresh { background-color: #007bff; flex: 0 0 auto; padding: 10px 14px; font-size: 13px; margin-top: 5px; }
        .btn-refresh:hover { background-color: #0069d9; }
        .btn-logout { background-color: #6c757d; margin-top: 15px; font-size: 13px; padding: 8px; }
        .btn-logout:hover { background-color: #5a6268; }
        button:disabled { background-color: #6c757d; cursor: not-allowed; }

        #status { text-align: center; margin-top: 15px; font-weight: bold; font-size: 14px; min-height: 20px; }
        .akumulasi-row { display: flex; align-items: flex-end; gap: 8px; }
        .akumulasi-row .field-wrap { flex: 1; }
        small.hint { color: #888; display: block; margin-top: 4px; font-size: 12px; }

        /* Informasi Region Aktif */
        .active-region { text-align: center; color: #007bff; font-weight: bold; margin-top: -10px; margin-bottom: 15px; font-size: 15px;}
    </style>
</head>

    <form id="panenForm" onsubmit="return false;">
        <label>Tanggal Laporan:</label>
        <input type="date" id="tanggal" name="tanggal" required onchange="onTanggalChange()">

        <label>Jam Laporan:</label>
        <select id="jam" name="jam" required onchange="updateJamHint()">
            <option value="" disabled selected>Pilih Jam...</option>
            <option value="06.00">06.00</option>
            <option value="07.00">07.00</option>
            <option value="08.00">08.00</option>
            <option value="09.00">09.00</option>
            <option value="10.00">10.00</option>
            <option value="11.00">11.00</option>
            <option value="12.00">12.00</option>
            <option value="13.00">13.00</option>
            <option value="14.00">14.00</option>
            <option value="15.00">15.00</option>
            <option value="16.00">16.00</option>
            <option value="17.30">17.30</option>
        </select>
        <small class="hint" id="jamHint"></small>

        <label>Estimasi Panen Saat Ini (Ton):</label>
        <input type="number" step="0.01" id="tonase" name="tonase"
               placeholder="">

        <label>Total Akumulasi (Ton) — diambil langsung dari database:</label>
        <div class="akumulasi-row">
            <div class="field-wrap">
                <input type="number" step="0.01" id="akumulasi" class="readonly-input" value="0" readonly>
            </div>
            <button type="button" class="btn-refresh" onclick="checkAccumulation()">Refresh</button>
        </div>

        <div class="btn-group">
            <button type="button" id="submitBtn" class="btn-submit" onclick="handleInsert()">Kirim Data</button>
            <button type="button" id="deleteBtn" class="btn-delete" onclick="handleDelete()">Hapus Jam Ini</button>
        </div>

        <button type="button" class="btn-logout" style="width:100%;" onclick="prosesLogout()">
            Ganti Region (Logout)
        </button>
        <p id="status"></p>
    </form>
</div>
<script>
// =========================================================================
// KONFIGURASI
// =========================================================================
var SCRIPT_URL     = "https://script.google.com/macros/s/AKfycbzqXfntnvNd7avgnfmfgeWu4UCf-iT2tVNMHZVNjJYZHpreOXow0R6nalGrMtqS4IGlFQ/exec";
var MAX_RETRIES    = 2;
var RETRY_DELAY_MS = 3000;
var SESSION_KEY    = "agripam_session";
var BC_CHANNEL     = "agripam_bc"; // nama channel BroadcastChannel

// =========================================================================
// BROADCASTCHANNEL — komunikasi antar tab
// =========================================================================
var bc = (typeof BroadcastChannel !== "undefined") ? new BroadcastChannel(BC_CHANNEL) : null;

// Pesan yang dikirim/diterima antar tab:
// { type: "SESSION_QUERY" }          → tab baru tanya: "ada sesi aktif?"
// { type: "SESSION_ANNOUNCE", region } → tab aktif jawab: "saya aktif dengan region X"
// { type: "SESSION_STARTED", region } → tab baru kasih tahu: "saya baru login region X"
// { type: "SESSION_ENDED" }           → tab yang logout kasih tahu semua tab

if (bc) {
    bc.onmessage = function(event) {
        var msg = event.data;
        if (!msg || !msg.type) return;

        if (msg.type === "SESSION_QUERY") {
            // Ada tab baru yang tanya — jawab jika kita punya sesi aktif
            var s = loadSession();
            if (s) {
                bc.postMessage({ type: "SESSION_ANNOUNCE", region: s.region });
            }

        } else if (msg.type === "SESSION_ANNOUNCE") {
            // Ada tab lain yang aktif — simpan info ini untuk dipakai saat login
            window._activeTabRegion = msg.region;

        } else if (msg.type === "SESSION_STARTED") {
            // Tab lain baru login — kita harus logout
            var mySession = loadSession();
            if (mySession) {
                clearSession();
                tampilkanLoginDariBC("Sesi Anda diakhiri karena ada login baru di tab lain (Region: " + msg.region + ").");
            }

        } else if (msg.type === "SESSION_ENDED") {
            // Tab lain logout — tidak perlu aksi khusus, tapi reset flag
            window._activeTabRegion = null;
        }
    };
}

// Saat halaman pertama dibuka, tanya apakah ada tab lain yang aktif
// Tunggu 300ms untuk memberi waktu tab lain merespons
function queryOtherTabs(callback) {
    if (!bc) { callback(null); return; }

    window._activeTabRegion = null;
    bc.postMessage({ type: "SESSION_QUERY" });

    setTimeout(function() {
        callback(window._activeTabRegion || null);
    }, 300);
}

function tampilkanLoginDariBC(pesan) {
    // Paksa tampilan kembali ke halaman login dengan pesan
    prosesLogoutSilent();
    showLoginError(pesan);
    document.getElementById("loginSection").style.display = "block";
    document.getElementById("mainSection").style.display  = "none";
}

// =========================================================================
// STATE
// =========================================================================
var currentJamData = {};
var isSubmitting   = false;
var sessionTimer   = null;

var statusText  = document.getElementById("status");
var submitBtn   = document.getElementById("submitBtn");
var deleteBtn   = document.getElementById("deleteBtn");
var akumulasiEl = document.getElementById("akumulasi");

// =========================================================================
// SESSION HELPERS
// =========================================================================

function saveSession(region, token, ttlMs) {
    var expiry = Date.now() + (ttlMs || 8 * 60 * 60 * 1000);
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({
        region: region,
        token:  token,
        expiry: expiry
    }));
    scheduleSessionWarning(expiry);
}

function loadSession() {
    try {
        var raw = sessionStorage.getItem(SESSION_KEY);
        if (!raw) return null;
        var s = JSON.parse(raw);
        if (Date.now() > s.expiry) {
            sessionStorage.removeItem(SESSION_KEY);
            return null;
        }
        return s;
    } catch (e) {
        sessionStorage.removeItem(SESSION_KEY);
        return null;
    }
}

function clearSession() {
    sessionStorage.removeItem(SESSION_KEY);
    if (sessionTimer) { clearTimeout(sessionTimer); sessionTimer = null; }
}

function scheduleSessionWarning(expiry) {
    if (sessionTimer) clearTimeout(sessionTimer);
    var warnAt = expiry - 15 * 60 * 1000;
    var now    = Date.now();
    if (warnAt > now) {
        sessionTimer = setTimeout(function () {
            var el = document.getElementById("sessionInfo");
            if (el) {
                el.textContent = "Sesi akan berakhir dalam ~15 menit. Simpan pekerjaan Anda.";
                el.className   = "session-info warning";
            }
        }, warnAt - now);
    }
    updateSessionDisplay(expiry);
}

function updateSessionDisplay(expiry) {
    var el = document.getElementById("sessionInfo");
    if (!el) return;
    var remaining = expiry - Date.now();
    if (remaining <= 0) {
        el.textContent = "Sesi berakhir.";
        el.className   = "session-info warning";
        return;
    }
    var hours = Math.floor(remaining / 3600000);
    var mins  = Math.floor((remaining % 3600000) / 60000);
    el.textContent = "Sesi aktif — berakhir " + hours + " jam " + mins + " menit lagi";
    el.className   = "session-info";
}

function requireSession() {
    var s = loadSession();
    if (!s) {
        alert("Sesi Anda sudah berakhir. Silakan login ulang.");
        prosesLogout();
        return null;
    }
    return s;
}

// =========================================================================
// JSONP ENGINE
// =========================================================================

function jsonpRequest(params, onSuccess, onError, _retry) {
    var retry        = _retry || 0;
    var callbackName = "jsonp_cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
    var script       = document.createElement("script");
    var timeoutId;

    function cleanup() {
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
        clearTimeout(timeoutId);
    }

    window[callbackName] = function (data) { cleanup(); onSuccess(data); };

    function doRetry(reason) {
        cleanup();
        if (retry < MAX_RETRIES) {
            setStatus(reason + " Mencoba ulang (" + (retry + 1) + "/" + MAX_RETRIES + ")...", "#888");
            setTimeout(function () {
                jsonpRequest(params, onSuccess, onError, retry + 1);
            }, RETRY_DELAY_MS);
        } else {
            onError(reason + " Periksa koneksi internet Anda.");
        }
    }

    script.onerror = function () { doRetry("Koneksi gagal."); };
    timeoutId = setTimeout(function () { doRetry("Server lambat merespons."); }, 20000);

    var query = Object.keys(params).map(function (k) {
        return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
    }).join("&");
    script.src = SCRIPT_URL + "?" + query + "&callback=" + callbackName;
    document.body.appendChild(script);
}

// =========================================================================
// LOGIN & LOGOUT
// =========================================================================

function prosesLogin() {
    var region   = document.getElementById("loginRegion").value;
    var password = document.getElementById("loginPassword").value;
    var loginBtn = document.getElementById("loginBtn");

    document.getElementById("loginError").style.display = "none";

    if (!region)   { showLoginError("Harap pilih Region terlebih dahulu!"); return; }
    if (!password) { showLoginError("Harap masukkan Password!"); return; }

    loginBtn.disabled    = true;
    loginBtn.textContent = "Memeriksa...";

    // Tanya tab lain dulu sebelum ke server
    queryOtherTabs(function(activeRegion) {
        if (activeRegion !== null) {
            // Ada tab lain yang aktif — tolak login
            loginBtn.disabled    = false;
            loginBtn.textContent = "Masuk";
            showLoginError(
                "Login ditolak: ada sesi aktif di tab lain (Region: " + activeRegion + "). " +
                "Tutup tab tersebut terlebih dahulu, lalu coba lagi."
            );
            return;
        }

        // Tidak ada tab lain aktif — lanjut ke server
        jsonpRequest(
            { action: "login", region: region, password: password },
            function (res) {
                loginBtn.disabled    = false;
                loginBtn.textContent = "Masuk";

                if (res.success) {
                    saveSession(region, res.token, res.ttlMs);

                    // Beritahu tab lain bahwa kita baru login
                    if (bc) bc.postMessage({ type: "SESSION_STARTED", region: region });

                    document.getElementById("loginSection").style.display = "none";
                    document.getElementById("mainSection").style.display  = "block";
                    document.getElementById("displayRegionText").textContent = "Region: " + region;
                    document.getElementById("loginPassword").value = "";

                    currentJamData = {};
                    updateJamHint();
                    if (document.getElementById("tanggal").value) checkAccumulation();

                } else {
                    showLoginError(res.message || ("Password salah untuk Region " + region + "!"));
                }
            },
            function (errMsg) {
                loginBtn.disabled    = false;
                loginBtn.textContent = "Masuk";
                showLoginError(errMsg);
            }
        );
    });
}

function showLoginError(msg) {
    var el = document.getElementById("loginError");
    el.textContent   = msg;
    el.style.display = "block";
}

// Logout normal (dengan broadcast)
function prosesLogout() {
  var s = loadSession();
  if (s) {
    // Beritahu server untuk hapus sesi — fire and forget
    jsonpRequest(
      { action: "logout", token: s.token, region: s.region },
      function() {}, function() {}
    );
  }
  clearSession();
  if (bc) bc.postMessage({ type: "SESSION_ENDED" });
  _resetUI();
}
// Logout diam-diam karena dipaksa oleh BroadcastChannel (tidak perlu broadcast balik)
function prosesLogoutSilent() {
    clearSession();
    _resetUI();
}

function _resetUI() {
    currentJamData = {};
    isSubmitting   = false;

    document.getElementById("mainSection").style.display  = "none";
    document.getElementById("loginSection").style.display = "block";
    document.getElementById("loginPassword").value        = "";
    document.getElementById("status").textContent         = "";
    document.getElementById("displayRegionText").textContent = "";
    document.getElementById("sessionInfo").textContent    = "";
    document.getElementById("loginError").style.display   = "none";
    updateJamHint();
}

// =========================================================================
// AKUMULASI & JAM HINT
// =========================================================================

function onTanggalChange() {
    currentJamData = {};
    updateJamHint();
    checkAccumulation();
}

function checkAccumulation() {
    var tanggal = document.getElementById("tanggal").value;
    var s       = loadSession();
    if (!tanggal || !s) {
        akumulasiEl.value = "0";
        currentJamData    = {};
        updateJamHint();
        return;
    }

    akumulasiEl.value = "";
    setStatus("Mengambil data terbaru dari database...", "#555");

    jsonpRequest(
        { action: "getData", tanggal: tanggal, region: s.region },
        function (res) {
            if (res.success) {
                akumulasiEl.value = res.total.toFixed(2);
                currentJamData    = res.jamData || {};
                setStatus("", "");
            } else {
                akumulasiEl.value = "0";
                currentJamData    = {};
                setStatus(res.message || "Gagal mengambil data.", "#dc3545");
            }
            updateJamHint();
        },
        function (errMsg) {
            akumulasiEl.value = "0";
            setStatus(errMsg, "#dc3545");
        }
    );
}

function updateJamHint() {
    var jam  = document.getElementById("jam").value;
    var hint = document.getElementById("jamHint");
    if (!jam) { hint.textContent = ""; return; }

    if (currentJamData.hasOwnProperty(jam)) {
        hint.textContent = "Jam " + jam + " sudah terisi: " + currentJamData[jam] + " Ton. "
                         + "Gunakan 'Hapus Jam Ini' jika ingin merevisi.";
        hint.style.color = "#dc3545";
    } else {
        hint.textContent = "Jam " + jam + " belum ada data.";
        hint.style.color = "#28a745";
    }
}

// =========================================================================
// INSERT
// =========================================================================

function handleInsert() {
    if (isSubmitting) { alert("Sedang memproses, harap tunggu."); return; }

    var s = requireSession();
    if (!s) return;

    var tanggal = document.getElementById("tanggal").value;
    var jam     = document.getElementById("jam").value;
    var tonase  = document.getElementById("tonase").value;

    if (!tanggal || !jam) { alert("Harap lengkapi Tanggal dan Jam!"); return; }
    if (!tonase)          { alert("Harap isi angka tonase untuk dikirim!"); return; }

    var tonaseNum = parseFloat(tonase);
    if (isNaN(tonaseNum) || tonaseNum < 0 || tonaseNum > 5000) {
        alert("Tonase tidak valid. Masukkan angka antara 0 dan 5.000 ton.");
        return;
    }

    if (currentJamData.hasOwnProperty(jam)) {
        alert("Data jam " + jam + " sudah ada. Gunakan 'Hapus Jam Ini' untuk merevisi.");
        return;
    }

    isSubmitting = true;
    setLoading(true, "Mengirim data...");

    jsonpRequest(
        { action: "insert", tanggal: tanggal, region: s.region, jam: jam, tonase: tonase, token: s.token },
        function (res) {
            isSubmitting = false;
            setLoading(false);
            if (res.success) {
                setStatus(res.message, "green");
                document.getElementById("tonase").value = "";
                if (res.total   !== undefined) akumulasiEl.value = res.total.toFixed(2);
                if (res.jamData !== undefined) currentJamData = res.jamData;
            } else {
                if (isSessionError(res.message)) { alert(res.message); prosesLogout(); return; }
                setStatus(res.message || "Gagal mengirim data.", "#dc3545");
                if (res.total   !== undefined) akumulasiEl.value = res.total.toFixed(2);
                if (res.jamData !== undefined) currentJamData = res.jamData;
            }
            updateJamHint();
        },
        function (errMsg) {
            isSubmitting = false;
            setLoading(false);
            setStatus(errMsg, "#dc3545");
        }
    );
}

// =========================================================================
// DELETE
// =========================================================================

function handleDelete() {
    if (isSubmitting) { alert("Sedang memproses, harap tunggu."); return; }

    var s = requireSession();
    if (!s) return;

    var tanggal = document.getElementById("tanggal").value;
    var jam     = document.getElementById("jam").value;

    if (!tanggal || !jam) { alert("Pilih Tanggal dan Jam yang ingin dihapus!"); return; }

    if (!currentJamData.hasOwnProperty(jam)) {
        alert("TIDAK DITEMUKAN: Tidak ada data tersimpan untuk jam " + jam + " pada Tanggal & Region ini.");
        return;
    }

    var konfirmasi = confirm(
        "Apakah Anda yakin ingin menghapus data laporan jam " + jam + "?\n"
        + "Tonase sebesar " + currentJamData[jam] + " Ton akan dihapus dari database & akumulasi."
    );
    if (!konfirmasi) return;

    isSubmitting = true;
    setLoading(true, "Menghapus data...");

    jsonpRequest(
        { action: "delete", tanggal: tanggal, region: s.region, jam: jam, token: s.token },
        function (res) {
            isSubmitting = false;
            setLoading(false);
            if (res.success) {
                setStatus(res.message, "#dc3545");
            } else {
                if (isSessionError(res.message)) { alert(res.message); prosesLogout(); return; }
                setStatus(res.message || "Gagal menghapus data.", "#dc3545");
            }
            if (res.total   !== undefined) akumulasiEl.value = res.total.toFixed(2);
            if (res.jamData !== undefined) currentJamData = res.jamData;
            updateJamHint();
        },
        function (errMsg) {
            isSubmitting = false;
            setLoading(false);
            setStatus(errMsg, "#dc3545");
        }
    );
}

// =========================================================================
// HELPERS
// =========================================================================

function isSessionError(msg) {
    if (!msg) return false;
    var l = msg.toLowerCase();
    return l.indexOf("sesi") !== -1 || l.indexOf("token") !== -1 || l.indexOf("login ulang") !== -1;
}

function setLoading(on, text) {
    submitBtn.disabled = on;
    deleteBtn.disabled = on;
    if (on) setStatus(text, "#555");
}

function setStatus(text, color) {
    statusText.textContent = text;
    statusText.style.color = color;
}

// =========================================================================
// INIT — pulihkan sesi jika halaman di-refresh
// =========================================================================
(function init() {
    var s = loadSession();
    if (s) {
        // Tab ini sudah punya sesi (refresh) — langsung aktif, tidak perlu query
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("mainSection").style.display  = "block";
        document.getElementById("displayRegionText").textContent = "Region: " + s.region;
        scheduleSessionWarning(s.expiry);
        currentJamData = {};
        updateJamHint();
    }
    // Jika tidak ada sesi, tidak perlu query — halaman login sudah tampil by default
})();
</script>

</body>
</html>
